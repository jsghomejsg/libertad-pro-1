<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#2 Texas First-Time Home Buyer Savings Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sora', sans-serif; background: #f3f4f6; color: #111827; margin: 0; }
        .hero { background: #00205b; color: #fff; padding: 60px 20px; text-align: center; border-bottom: 5px solid #bf0d3e; }
        .container { max-width: 600px; margin: -40px auto 40px; background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 1rem; }
        button { width: 100%; padding: 20px; background: #bf0d3e; color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
        #res { margin-top: 30px; display: none; padding: 20px; background: #f9fafb; border: 1px dashed #00205b; text-align: center; }
        .seo-text { max-width: 800px; margin: 0 auto; padding: 40px 20px; line-height: 1.8; }
    </style>
</head>
<body>
<section class="hero"><h1>#2 Texas Home Buyer Tool</h1><p>Analyze your 2026 Lone Star State mortgage goals.</p></section>
<div class="container">
    <input type="number" id="p" placeholder="Home Price ($)">
    <input type="number" id="s" placeholder="Current Savings ($)">
    <button onclick="check()">Analyze Market Readiness</button>
    <div id="res"></div>
</div>
<article class="seo-text">
    <h2>Texas FHA and Conventional Loan Guide 2026</h2>
    <p>Buying in cities like Dallas or Houston requires a 3.5% down payment for most FHA loans. This tool estimates your gap based on current Texas property standards.</p>
    <div style="margin:40px 0;">
        <script async="async" data-cfasync="false" src="https://pl28879963.effectivegatecpm.com/3971cbb4233ab0d81635cde997026c7f/invoke.js"></script>
        <div id="container-3971cbb4233ab0d81635cde997026c7f"></div>
    </div>
</article>
<script>
    function check() {
        const price = document.getElementById('p').value;
        const savings = document.getElementById('s').value;
        if(price && savings) {
            const target = price * 0.035;
            const gap = target - savings;
            const r = document.getElementById('res');
            r.style.display = 'block';
            r.innerHTML = gap > 0 ? `<h3>Goal: $${target.toFixed(0)}</h3><p>You need $${gap.toFixed(0)} more.</p>` : `<h3>You are Ready!</h3>`;
        }
    }
</script>
</body>
</html>
