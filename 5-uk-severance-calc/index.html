<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#5 UK Redundancy Pay Calculator | 2026</title>
    <style>
        body { font-family: 'Helvetica', sans-serif; background: #f3f4f6; margin: 0; }
        header { background: #002452; color: #fff; padding: 30px; text-align: center; border-bottom: 5px solid #cf142b; }
        .calc { max-width: 500px; margin: 20px auto; background: #fff; padding: 30px; border-radius: 15px; border: 1px solid #ddd; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #cf142b; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #res { margin-top: 20px; display: none; padding: 15px; background: #fff1f2; border: 1px solid #cf142b; text-align: center; }
    </style>
</head>
<body>
<header><h1>#5 UK Redundancy Pay</h1></header>
<div class="calc">
    <input type="number" id="y" placeholder="Years of Service">
    <input type="number" id="w" placeholder="Weekly Pay (£)">
    <button onclick="uk()">Estimate Statutory Pay</button>
    <div id="res"></div>
</div>
<article style="max-width:800px; margin:20px auto; padding:20px;">
    <h2>UK Employment Rights 2026</h2>
    <p>Statutory redundancy pay in the UK is calculated based on age and length of service. This tool provides an estimate based on the 2026 weekly cap.</p>
    <script async="async" data-cfasync="false" src="https://pl28879963.effectivegatecpm.com/3971cbb4233ab0d81635cde997026c7f/invoke.js"></script>
    <div id="container-3971cbb4233ab0d81635cde997026c7f"></div>
</article>
<script>
    function uk() {
        const y = document.getElementById('y').value;
        const w = Math.min(document.getElementById('w').value, 700);
        if(y >= 2 && w) {
            const pay = y * w;
            const r = document.getElementById('res');
            r.style.display = 'block';
            r.innerHTML = `<h3>Estimate: £${pay.toFixed(2)}</h3>`;
        }
    }
</script>
</body>
</html>
