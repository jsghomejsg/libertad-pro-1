<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="434e69572ce15af6" />
    <title>Libertad Pro 1 | Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        header { background: #fff; padding: 3rem 2rem; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .hero h1 { font-size: 2.5rem; font-weight: 800; margin: 0; }
        .search-container { max-width: 600px; margin: -30px auto 0; padding: 0 1rem; }
        #search { width: 100%; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.05); outline: none; }
        .container { max-width: 1000px; margin: 4rem auto; padding: 0 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; }
        .app-card { background: #fff; padding: 1.5rem; border-radius: 20px; border: 1px solid #e2e8f0; text-decoration: none; color: inherit; display: flex; align-items: center; gap: 15px; }
    </style>
</head>
<body>
<header class="hero"><h1>Libertad Pro 1</h1></header>
<div class="search-container"><input type="text" id="search" placeholder="Search apps..." onkeyup="filter()"></div>
<div class="container">
    <div class="grid" id="appGrid">
        <a href="nurse-loan-refinance-ca/" class="app-card"><div>🏥</div><h3>#1 Nurse Loan</h3></a>
        <a href="texas-home-buyer-tool/" class="app-card"><div>🏠</div><h3>#2 TX Home</h3></a>
        <a href="3-trucker-tax-estimator/" class="app-card"><div>🚛</div><h3>#3 Trucker Tax</h3></a>
        <a href="4-florida-solar-roi/" class="app-card"><div>☀️</div><h3>#4 Solar ROI</h3></a>
        <a href="5-uk-severance-calc/" class="app-card"><div>🇬🇧</div><h3>#5 UK Redundancy</h3></a>
    </div>
</div>
<script>
    function filter() {
        let val = document.getElementById('search').value.toLowerCase();
        let cards = document.getElementsByClassName('app-card');
        for (let card of cards) {
            card.style.display = card.innerText.toLowerCase().includes(val) ? "flex" : "none";
        }
    }
</script>
</body>
</html>
