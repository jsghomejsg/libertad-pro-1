<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="434e69572ce15af6" />
    <title>Libertad Pro 1 | Financial & Career Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0284c7; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: #334155; }
        header { background: #fff; padding: 3rem 2rem; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .hero h1 { font-size: 2.5rem; font-weight: 800; margin: 0; color: var(--dark); }
        .hero p { color: #64748b; margin-top: 10px; }
        .search-container { max-width: 600px; margin: -30px auto 0; padding: 0 1rem; }
        #search { width: 100%; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.05); outline: none; font-size: 1rem; box-sizing: border-box; }
        .container { max-width: 1000px; margin: 4rem auto; padding: 0 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; }
        .app-card { background: #fff; padding: 1.5rem; border-radius: 20px; border: 1px solid #e2e8f0; text-decoration: none; color: inherit; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .app-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-color: var(--primary); }
        .icon { font-size: 2.2rem; }
        .progress-bar { max-width: 600px; margin: 20px auto; background: #e2e8f0; border-radius: 20px; height: 10px; overflow: hidden; }
        .progress-fill { background: var(--primary); height: 100%; width: 1%; transition: width 0.5s; }
        .text-center { text-align: center; font-size: 0.85rem; color: #64748b; margin-bottom: 30px; font-weight: 600; }
    </style>
</head>
<body>
<header class="hero">
    <h1>Libertad Pro 1</h1>
    <p>Premium Financial & Career Tools</p>
</header>

<div class="search-container">
    <input type="text" id="search" placeholder="Search tools..." onkeyup="filter()">
</div>

<div class="container">
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <div class="text-center">System Progress: 1 / 100 Apps Live</div>

    <div class="grid" id="appGrid">
        
        <a href="1-nurse-loan-refinance-ca/" class="app-card">
            <div class="icon">🏥</div>
            <div>
                <h3 style="margin:0; font-size: 1.1rem; color: var(--dark);">#1 CA Nurse Refi</h3>
                <span style="font-size: 0.8rem; color: #64748b;">California Edition</span>
            </div>
        </a>
        
    </div>
</div>

<script>
    function filter() {
        let val = document.getElementById('search').value.toLowerCase();
        let cards = document.getElementsByClassName('app-card');
        for (let card of cards) {
            card.style.display = card.innerText.toLowerCase().includes(val) ? "flex" : "none";
        }
    }
</script>
</body>
</html>
