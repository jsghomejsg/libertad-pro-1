<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#4 Florida Solar ROI Calculator | 2026</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0fdf4; margin: 0; }
        header { background: #065f46; color: #fff; padding: 40px; text-align: center; border-bottom: 5px solid #f59e0b; }
        .card { max-width: 500px; margin: -20px auto 40px; background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #f59e0b; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #res { margin-top: 20px; display: none; padding: 20px; border: 2px solid #065f46; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>
<header><h1>#4 Florida Solar ROI</h1></header>
<div class="card">
    <input type="number" id="bill" placeholder="Avg Monthly Bill ($)">
    <input type="number" id="cost" placeholder="System Cost ($)">
    <button onclick="solar()">Check Payback Period</button>
    <div id="res"></div>
</div>
<article style="max-width:800px; margin:20px auto; padding:20px; line-height:1.6;">
    <h2>Florida Solar Incentives 2026</h2>
    <p>With the federal tax credit still active, Florida homeowners can recover 30% of their investment in the first fiscal year. This tool estimates your breakeven point.</p>
    <script async="async" data-cfasync="false" src="https://pl28879963.effectivegatecpm.com/3971cbb4233ab0d81635cde997026c7f/invoke.js"></script>
    <div id="container-3971cbb4233ab0d81635cde997026c7f"></div>
</article>
<script>
    function solar() {
        const b = document.getElementById('bill').value;
        const c = document.getElementById('cost').value;
        if(b && c) {
            const payback = (c * 0.7) / (b * 12);
            const r = document.getElementById('res');
            r.style.display = 'block';
            r.innerHTML = `<h3>Payback: ${payback.toFixed(1)} Years</h3>`;
        }
    }
</script>
</body>
</html>
