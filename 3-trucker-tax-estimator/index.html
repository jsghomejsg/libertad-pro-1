<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#3 Owner-Operator Trucker Tax Estimator | 2026 USA</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; margin: 0; color: #334155; }
        header { background: #1e293b; color: #fff; padding: 30px; text-align: center; border-bottom: 4px solid #e63946; }
        .box { max-width: 500px; margin: 20px auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #e63946; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #res { margin-top: 20px; padding: 15px; background: #f0fdf4; border: 1px solid #16a34a; border-radius: 8px; display: none; }
    </style>
</head>
<body>
<header><h1>#3 Trucker Tax Estimator</h1></header>
<div class="box">
    <input type="number" id="rev" placeholder="Monthly Revenue ($)">
    <input type="number" id="exp" placeholder="Monthly Expenses ($)">
    <input type="number" id="days" placeholder="Days on the Road">
    <button onclick="run()">Calculate Net Profit</button>
    <div id="res"></div>
</div>
<article style="max-width:800px; margin:20px auto; padding:20px;">
    <h2>IRS Per Diem and Deduction Guide</h2>
    <p>For 2026, the IRS per diem rate allows for significant non-taxable income for logistics professionals. Use this tool to separate your cash flow from your taxable liability.</p>
    <div style="margin:20px 0;">
        <script async="async" data-cfasync="false" src="https://pl28879963.effectivegatecpm.com/3971cbb4233ab0d81635cde997026c7f/invoke.js"></script>
        <div id="container-3971cbb4233ab0d81635cde997026c7f"></div>
    </div>
</article>
<script>
    function run() {
        const r = parseFloat(document.getElementById('rev').value);
        const e = parseFloat(document.getElementById('exp').value);
        const d = parseFloat(document.getElementById('days').value);
        if(r && e && d) {
            const cash = r - e;
            const taxable = Math.max(0, cash - (d * 69));
            const net = cash - (taxable * 0.25);
            const div = document.getElementById('res');
            div.style.display = 'block';
            div.innerHTML = `<h3>Real Take-Home: $${net.toFixed(2)}</h3><p>Based on estimated tax brackets.</p>`;
        }
    }
</script>
</body>
</html>
